<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Belalang Erine</title>
    <style>
      .card {
        background: #f3f3f3;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin: 20px auto;
        max-width: 600px;
        width: 90%;
        text-align: center;
        font-family: Garamond, serif;
        background: #fff8f2;
      }

      input[type="text"],
      input[type="range"] {
        padding: 10px;
        width: 80%;
        max-width: 300px;
        border-radius: 5px;
        border: 1px solid #ccc;
        margin-top: 10px;
      }

      input[type="range"] {
        accent-color: #c87c41;
      }

      button {
        padding: 12px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th,
      td {
        padding: 10px;
        border: 1px solid #ddd;
      }

      th {
        background: #372e27;
        color: white;
      }

      #gameCanvas {
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16 / 9;
        background-image: url("./assets/grasshopper-collector_latar.png");
        background-size: cover;
        background-position: center 80%;
        border: 2px solid #333;
        border-radius: 10px;
        display: block;
        margin: 20px auto;
      }

      @media (max-width: 600px) {
        button,
        input[type="text"],
        input[type="range"] {
          width: 100%;
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Masukkan Nama untuk Mulai Game Belalang Erine</h2>
      <input id="playerName" type="text" placeholder="Contoh: Erine Lovers" />
      <br />
      <button onclick="validateAndStart()">Mulai Game</button>
    </div>

    <canvas id="gameCanvas" width="960" height="540"></canvas>

    <div class="card">
      <label for="volumeControl">🔊 Atur Volume Musik</label><br />
      <input
        type="range"
        id="volumeControl"
        min="0"
        max="1"
        step="0.01"
        value="0.2"
      />
    </div>

    <div class="card">
      <h3>🏆 Leaderboard Top 10</h3>
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Belalang</th>
          </tr>
        </thead>
        <tbody id="leaderboard"></tbody>
      </table>
    </div>

    <audio
      id="bgm"
      src="./assets/grasshopper-collector_bgm.mp3"
      loop
    ></audio>
    <img
      id="belalang-img"
      src="./assets/grasshopper-collector_belalang.png"
      style="display: none"
    />

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const belalangImg = document.getElementById("belalang-img");
      const bgm = document.getElementById("bgm");
      const volumeSlider = document.getElementById("volumeControl");

      const runFrames = [
        "./assets/grasshopper-collector_bl1.png",
        "./assets/grasshopper-collector_bl2.png",
        "./assets/grasshopper-collector_bl3.png",
        "./assets/grasshopper-collector_bl4.png",
        "./assets/grasshopper-collector_bl5.png",
        "./assets/grasshopper-collector_bl6.png",
      ];

      let bird, pipes, belalangs, score, gameOver;
      let playerName = "";
      let scale = 1;

      function detectDeviceScale() {
        const width = window.innerWidth;
        if (width < 500) scale = 0.5;
        else if (width < 800) scale = 0.75;
        else scale = 1;
      }

      volumeSlider.addEventListener("input", () => {
        bgm.volume = parseFloat(volumeSlider.value);
      });

      function validateAndStart() {
        const input = document.getElementById("playerName").value.trim();
        if (!input && !playerName) {
          alert("Masukkan nama terlebih dahulu.");
          return;
        }
        if (input) playerName = input;
        initGame();
      }

      function initGame() {
        detectDeviceScale();
        bird = {
          x: 100,
          y: 100,
          width: 100 * scale,
          height: 85 * scale,
          gravity: 0.25,
          lift: -6,
          velocity: 0,
          frame: 0,
          frameCount: 0,
        };
        pipes = [];
        belalangs = [];
        score = 0;
        gameOver = false;
        bgm.volume = parseFloat(volumeSlider.value);
        bgm.play().catch(() => {});
        loop();
      }

      function drawBird() {
        bird.frameCount++;
        if (bird.frameCount % 5 === 0)
          bird.frame = (bird.frame + 1) % runFrames.length;
        const frameImg = new Image();
        frameImg.src = runFrames[bird.frame];
        ctx.drawImage(frameImg, bird.x, bird.y, bird.width, bird.height);
      }

      function drawPipes() {
        ctx.fillStyle = "#0f0";
        pipes.forEach((pipe) => {
          ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
          ctx.fillRect(
            pipe.x,
            pipe.top + pipe.gap,
            pipe.width,
            canvas.height - pipe.top - pipe.gap
          );
        });
      }

      function drawBelalangs() {
        belalangs.forEach((b) => {
          if (!b.taken) ctx.drawImage(belalangImg, b.x, b.y, b.width, b.height);
        });
      }

      function drawOverlayText() {
        ctx.drawImage(belalangImg, 10, 8, 24, 24);
        ctx.font = "20px Garamond";
        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.strokeText("x " + score, 40, 28);
        ctx.fillText("x " + score, 40, 28);

        if (gameOver) {
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.font = "36px Garamond";
          ctx.fillStyle = "white";
          ctx.textAlign = "center";
          ctx.fillText("Game Over!", centerX, centerY - 40);
          ctx.fillText("Erine Menangkap Belalang", centerX, centerY);
          ctx.fillText("Total: " + score, centerX, centerY + 40);
          ctx.fillStyle = "#00c267";
          ctx.fillRect(centerX - 80, centerY + 70, 160, 40);
          ctx.fillStyle = "white";
          ctx.font = "18px Garamond";
          ctx.fillText("MAIN LAGI", centerX, centerY + 98);
          ctx.textAlign = "start";
        }
      }

      function updatePipes() {
        if (
          pipes.length === 0 ||
          pipes[pipes.length - 1].x < canvas.width - 250
        ) {
          const top = 80 + Math.random() * 120; // lebih pendek
          const gap = 230; // lebih lebar
          pipes.push({ x: canvas.width, width: 50, top, gap, passed: false });
          belalangs.push({
            x: canvas.width + 60,
            y: top + gap / 2 - 15,
            width: 30 * scale,
            height: 30 * scale,
            taken: false,
          });
        }

        pipes.forEach((pipe) => {
          pipe.x -= 2;
          const margin = 10;
          const hitbox = {
            x: bird.x + margin,
            y: bird.y + margin,
            width: bird.width - 2 * margin,
            height: bird.height - 2 * margin,
          };
          const hit =
            hitbox.x < pipe.x + pipe.width &&
            hitbox.x + hitbox.width > pipe.x &&
            (hitbox.y < pipe.top ||
              hitbox.y + hitbox.height > pipe.top + pipe.gap);
          if (hit) gameOver = true;
        });

        pipes = pipes.filter((pipe) => pipe.x + pipe.width > 0);
      }

      function updateBelalangs() {
        belalangs.forEach((b) => {
          b.x -= 2;
          if (
            !b.taken &&
            bird.x < b.x + b.width &&
            bird.x + bird.width > b.x &&
            bird.y < b.y + b.height &&
            bird.y + bird.height > b.y
          ) {
            b.taken = true;
            score++;
          }
        });
        belalangs = belalangs.filter((b) => b.x + b.width > 0);
      }

      function update() {
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
        if (bird.y + bird.height > canvas.height || bird.y < 0) gameOver = true;
        updatePipes();
        updateBelalangs();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawPipes();
        drawBelalangs();
        drawBird();
        drawOverlayText();
      }

      function loop() {
        if (!gameOver) {
          update();
          draw();
          requestAnimationFrame(loop);
        } else {
          draw();
          saveToLeaderboard(playerName, score);
          renderLeaderboard();
        }
      }

      function saveToLeaderboard(name, score) {
        const data =
          JSON.parse(localStorage.getItem("belalang_leaderboard")) || [];
        data.push({ name, score });
        data.sort((a, b) => b.score - a.score);
        localStorage.setItem(
          "belalang_leaderboard",
          JSON.stringify(data.slice(0, 10))
        );
      }

      function renderLeaderboard() {
        const data =
          JSON.parse(localStorage.getItem("belalang_leaderboard")) || [];
        const tbody = document.getElementById("leaderboard");
        tbody.innerHTML = "";
        data.forEach((item, index) => {
          tbody.innerHTML += `<tr><td>${index + 1}</td><td>${
            item.name
          }</td><td>${item.score}</td></tr>`;
        });
      }

      canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        if (
          gameOver &&
          clickX >= centerX - 80 &&
          clickX <= centerX + 80 &&
          clickY >= centerY + 70 &&
          clickY <= centerY + 110
        ) {
          validateAndStart();
        } else {
          bird.velocity = bird.lift;
        }
      });

      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          if (gameOver) {
            validateAndStart();
          } else {
            bird.velocity = bird.lift;
          }
        }
      });

      canvas.addEventListener("touchstart", () => {
        if (gameOver) {
          validateAndStart();
        } else {
          bird.velocity = bird.lift;
        }
      });

      renderLeaderboard();
    </script>
  </body>
</html>
